<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الحضور</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --sage:       #4a7c6f;
  --sage-light: #e8f2ef;
  --sage-mid:   #6b9e8f;
  --sage-dark:  #2d5c51;
  --sand:       #f7f5f0;
  --white:      #ffffff;
  --ink:        #1c2b28;
  --muted:      #7a9490;
  --border:     #e0e8e5;
  --red:        #c94f4f;
  --red-bg:     #fdf0f0;
  --amber:      #b07d3a;
  --amber-bg:   #fdf6ec;
  --r:          18px;
}

body{
  font-family:'Tajawal',sans-serif;
  background:var(--sand);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--ink);
}

/* ─── Animated background dots ─── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(74,124,111,.06) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}

.wrap{width:100%;max-width:400px;position:relative;z-index:1;}

/* ─── Top badge ─── */
.top-badge{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:32px;
  animation:fadeDown .6s ease both;
}
.top-badge .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--sage);
  animation:pulse 2s ease-in-out infinite;
}
.top-badge span{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.5px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ─── Main card ─── */
.card{
  background:var(--white);
  border-radius:var(--r);
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 4px 24px rgba(74,124,111,.08),0 1px 4px rgba(0,0,0,.04);
  animation:fadeUp .5s ease both .1s;
}

/* ─── Card header ─── */
.card-head{
  padding:32px 28px 24px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.icon-ring{
  width:72px;height:72px;
  border-radius:50%;
  background:var(--sage-light);
  border:2px solid var(--border);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:18px;
}
.icon-ring svg{width:32px;height:32px;fill:var(--sage);}
.card-head h1{font-size:20px;font-weight:700;margin-bottom:5px;}
.card-head p{font-size:13px;color:var(--muted);font-weight:300;line-height:1.6;}

/* ─── Card body ─── */
.card-body{padding:24px 28px;}

/* ─── Status strip (GPS / Zone) ─── */
.status-strip{
  display:flex;gap:10px;margin-bottom:22px;
}
.strip-item{
  flex:1;padding:12px 14px;
  background:var(--sand);
  border:1px solid var(--border);
  border-radius:12px;
  display:flex;flex-direction:column;gap:4px;
}
.strip-label{font-size:11px;color:var(--muted);font-weight:500;}
.strip-val{
  font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:5px;
}
.strip-val .pip{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:var(--border);transition:background .4s;
}
.pip.ok{background:#4caf7d;}
.pip.bad{background:var(--red);}
.pip.loading{background:var(--amber);animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── Input ─── */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:12px;font-weight:600;
  color:var(--muted);margin-bottom:7px;letter-spacing:.3px;
}
.input-wrap{position:relative;}
.input-wrap input{
  width:100%;padding:14px 16px 14px 46px;
  border:1.5px solid var(--border);
  border-radius:12px;
  font-family:inherit;font-size:15px;font-weight:500;
  color:var(--ink);background:var(--sand);
  outline:none;transition:border .2s,background .2s,box-shadow .2s;
  direction:ltr;text-align:right;
}
.input-wrap input:focus{
  border-color:var(--sage);background:var(--white);
  box-shadow:0 0 0 4px rgba(74,124,111,.1);
}
.input-wrap .ico{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:18px;pointer-events:none;
}

/* ─── Button ─── */
.btn{
  width:100%;padding:15px;
  border:none;border-radius:12px;
  font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-main{
  background:var(--sage);color:var(--white);
  box-shadow:0 4px 16px rgba(74,124,111,.3);
  margin-bottom:10px;
}
.btn-main:hover{background:var(--sage-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,124,111,.35);}
.btn-main:active{transform:none;}
.btn-main:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none;}

.btn-refresh{
  background:transparent;color:var(--muted);
  border:1.5px solid var(--border);font-size:13px;padding:10px;
}
.btn-refresh:hover{border-color:var(--sage-mid);color:var(--sage);}

/* ─── Alert ─── */
.alert{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;border-radius:12px;
  font-size:13px;font-weight:500;line-height:1.6;
  margin-top:14px;
  animation:fadeIn .3s ease;
}
.alert.success{background:var(--sage-light);color:var(--sage-dark);border:1px solid rgba(74,124,111,.2);}
.alert.error{background:var(--red-bg);color:var(--red);border:1px solid rgba(201,79,79,.15);}
.alert.warn{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(176,125,58,.2);}
.alert-ico{font-size:18px;flex-shrink:0;margin-top:1px;}

/* ─── Footer ─── */
.card-foot{
  padding:16px 28px;
  background:var(--sand);
  border-top:1px solid var(--border);
  text-align:center;
}
.card-foot p{font-size:11px;color:var(--muted);line-height:1.7;}
.device-id{
  font-size:10px;color:var(--border);
  margin-top:4px;direction:ltr;
  word-break:break-all;
}

/* ─── Spinner ─── */
.spin{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.35);
  border-top-color:white;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="wrap">

  <div class="top-badge">
    <div class="dot"></div>
    <span>نظام الحضور الذكي</span>
    <div class="dot"></div>
  </div>

  <div class="card">

    <!-- Head -->
    <div class="card-head">
      <div class="icon-ring">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <h1>تسجيل الحضور</h1>
      <p>يتحقق من موقعك وجهازك تلقائياً<br>لضمان دقة التسجيل</p>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- GPS Status Strip -->
      <div class="status-strip">
        <div class="strip-item">
          <span class="strip-label">الموقع</span>
          <div class="strip-val">
            <div class="pip loading" id="gps-pip"></div>
            <span id="gps-txt">جاري التحديد</span>
          </div>
        </div>
        <div class="strip-item">
          <span class="strip-label">المنطقة المسموحة</span>
          <div class="strip-val">
            <div class="pip" id="zone-pip"></div>
            <span id="zone-txt">—</span>
          </div>
        </div>
      </div>

      <!-- Phone Input -->
      <div class="field">
        <label>رقم جوالك</label>
        <div class="input-wrap">
          <span class="ico">📱</span>
          <input type="tel" id="phone" placeholder="05XXXXXXXX" maxlength="10"
            onkeydown="if(event.key==='Enter') doCheckIn()">
        </div>
      </div>

      <!-- Buttons -->
      <button class="btn btn-main" id="checkin-btn" onclick="doCheckIn()">
        تسجيل الحضور
      </button>
      <button class="btn btn-refresh" onclick="getLocation()">
        تحديث الموقع
      </button>

      <!-- Alert -->
      <div id="alert-box"></div>

    </div>

    <!-- Footer -->
    <div class="card-foot">
      <p>هذا الجهاز مرتبط برقم جوال واحد فقط<br>ولا يمكن تسجيل أكثر من شخص من نفس الجهاز</p>
      <div class="device-id" id="did-display"></div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════
// ⚙️  غيّر هذه القيم لموقعك الفعلي
// ══════════════════════════════════════
const ZONE_LAT      = 24.783556;
const ZONE_LNG      = 46.724472;
const ZONE_RADIUS_M = 100;
const STORAGE_KEY   = 'att_sys_v1';   // مفتاح مشترك مع صفحة المدير
// ══════════════════════════════════════

// ─── Device ID (دائم لهذا المتصفح) ───
function getDeviceId(){
  let id = localStorage.getItem('__did__');
  if(!id){
    id='D-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,7).toUpperCase();
    localStorage.setItem('__did__',id);
  }
  return id;
}

const DEVICE_ID = getDeviceId();
document.getElementById('did-display').textContent = 'معرّف الجهاز: '+DEVICE_ID;

// ─── Haversine ───
function dist(la1,lo1,la2,lo2){
  const R=6371000,d2r=Math.PI/180;
  const dLa=(la2-la1)*d2r, dLo=(lo2-lo1)*d2r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─── State ───
let pos = null;

// ─── Alert helper ───
function alert_(type,ico,msg){
  document.getElementById('alert-box').innerHTML=
    `<div class="alert ${type}"><span class="alert-ico">${ico}</span><span>${msg}</span></div>`;
}

// ─── Get Location ───
function getLocation(){
  const pip=document.getElementById('gps-pip');
  const txt=document.getElementById('gps-txt');
  const zpip=document.getElementById('zone-pip');
  const ztxt=document.getElementById('zone-txt');
  const btn=document.querySelector('.btn-refresh');
  pip.className='pip loading'; txt.textContent='جاري التحديد...';
  zpip.className='pip'; ztxt.textContent='—';
  if(btn) btn.disabled=true;
  if(!navigator.geolocation){
    pip.className='pip bad'; txt.textContent='المتصفح لا يدعم GPS';
    if(btn) btn.disabled=false; return;
  }
  function onSuccess(p){
    pos=p.coords;
    pip.className='pip ok';
    txt.textContent=pos.latitude.toFixed(5)+', '+pos.longitude.toFixed(5);
    const d=dist(pos.latitude,pos.longitude,ZONE_LAT,ZONE_LNG);
    const inside=d<=ZONE_RADIUS_M;
    zpip.className='pip '+(inside?'ok':'bad');
    ztxt.textContent=inside?'داخل المنطقة ✓':'خارج المنطقة ✗ ('+Math.round(d)+'م)';
    if(btn) btn.disabled=false;
  }
  function onError(err){
    pip.className='pip bad';
    const msgs={1:'الإذن مرفوض — اسمح بالموقع من إعدادات المتصفح',2:'تعذّر تحديد الموقع',3:'انتهت المهلة — حاول مرة أخرى'};
    txt.textContent=msgs[err.code]||'خطأ';
    alert_('error','📍',msgs[err.code]||'تعذّر تحديد الموقع');
    if(btn) btn.disabled=false;
  }
  navigator.geolocation.getCurrentPosition(onSuccess,
    function(){ navigator.geolocation.getCurrentPosition(onSuccess,onError,{enableHighAccuracy:false,timeout:15000,maximumAge:30000}); },
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}


// ─── Storage helpers ───
function getData(){ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"users":{},"records":[]}'); }
function saveData(d){ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }

// ─── Check In ───
function doCheckIn(){
  const phone=document.getElementById('phone').value.trim();
  const btn=document.getElementById('checkin-btn');
  if(phone.length<10){ alert_('error','⚠️','أدخل رقم جوال صحيح (10 أرقام)'); return; }
  if(!pos){ alert_('warn','📍','اضغط "تحديث الموقع" أولاً'); return; }

  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div>';

  setTimeout(()=>{
    const data=getData();

    // 1. تحقق من الموقع
    const d=dist(pos.latitude,pos.longitude,ZONE_LAT,ZONE_LNG);
    if(d>ZONE_RADIUS_M){
      alert_('error','📍',`أنت خارج المنطقة المحددة بـ ${Math.round(d)} متر`);
      done(btn); return;
    }

    // 2. تحقق: هل هذا الجهاز مسجّل بـرقم آخر؟ (جهاز واحد = رقم واحد)
    const usedBy=Object.entries(data.users).find(([p,u])=>u.deviceId===DEVICE_ID && p!==phone);
    if(usedBy){
      alert_('error','🚫',`هذا الجهاز مسجّل برقم آخر — لا يمكن تسجيل أكثر من شخص من نفس الجهاز`);
      done(btn); return;
    }

    // 3. تحقق: هل الرقم مسجّل؟
    if(!data.users[phone]){
      // تسجيل تلقائي إذا أول مرة
      data.users[phone]={deviceId:DEVICE_ID, registeredAt:new Date().toISOString()};
    }

    // 4. تحقق: هل Device ID مطابق؟
    if(data.users[phone].deviceId!==DEVICE_ID){
      alert_('error','🚫','لا يمكن تسجيل الحضور — هذا الرقم مرتبط بجهاز آخر');
      done(btn); return;
    }

    // 5. تحقق 24 ساعة
    const last=data.records.filter(r=>r.phone===phone).pop();
    if(last){
      const diffH=(Date.now()-new Date(last.time).getTime())/(1000*60*60);
      if(diffH<24){
        const rH=Math.floor(24-diffH), rM=Math.floor(((24-diffH)-rH)*60);
        alert_('warn','⏳',`تم تسجيل حضورك مسبقاً — يمكنك التسجيل بعد ${rH} ساعة و${rM} دقيقة`);
        done(btn); return;
      }
    }

    // ✅ كل الشروط اجتازت — سجّل الحضور
    data.records.push({
      phone, deviceId:DEVICE_ID,
      lat:pos.latitude, lng:pos.longitude, accuracy:pos.accuracy,
      time:new Date().toISOString()
    });
    saveData(data);
    alert_('success','✅',`تم تسجيل حضورك بنجاح — ${new Date().toLocaleTimeString('ar-SA')}`);
    done(btn);
  },900);
}

function done(btn){ btn.disabled=false; btn.textContent='تسجيل الحضور'; }

// ─── Init ───
getLocation();
</script>
</body>
</html>
