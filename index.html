<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knights FC</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a843;--gold2:#f5c842;--gold3:#ffe066;
  --silver:#b8c4cc;--silver2:#dce8f0;--silver3:#f0f4f8;
  --dark:#080808;--dark2:#111;--dark3:#1c1c1c;
  --card:rgba(12,12,12,.88);--border:rgba(212,168,67,.2);
  --white:#fff;--muted:rgba(255,255,255,.4);
}

body{
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;color:var(--white);
  overflow-x:hidden;position:relative;
}

/* ─── Camp Nou SVG Background ─── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:#050a10;
  overflow:hidden;
}

/* Stadium structure */
.bg svg{width:100%;height:100%;position:absolute;top:0;left:0;}

/* Dark overlay for readability */
.bg-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom, rgba(5,10,16,.5) 0%, rgba(5,10,16,.3) 40%, rgba(5,10,16,.7) 100%),
    radial-gradient(ellipse 70% 50% at 50% 50%, rgba(212,168,67,.05) 0%, transparent 70%);
}

/* Gold shimmer lines */
.bg-lines{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(212,168,67,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,67,.04) 1px, transparent 1px);
  background-size:50px 50px;
}

/* ─── Top brand ─── */
.top-wrap{
  position:relative;z-index:2;
  text-align:center;margin-bottom:24px;
  animation:fadeDown .7s ease both;
}
.club-name{
  font-size:28px;font-weight:900;
  letter-spacing:6px;
  background:linear-gradient(135deg,var(--silver2),var(--gold2),var(--silver3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  margin-bottom:4px;
}
.club-sub{font-size:10px;letter-spacing:4px;color:rgba(212,168,67,.6);font-weight:500;}
.gold-line{
  width:80px;height:1px;margin:8px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
}

/* ─── Card ─── */
.card{
  position:relative;z-index:2;
  width:100%;max-width:390px;
  background:var(--card);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-radius:22px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:
    0 40px 80px rgba(0,0,0,.9),
    0 0 0 1px rgba(212,168,67,.08),
    inset 0 1px 0 rgba(212,168,67,.12);
  animation:fadeUp .6s ease both .15s;
}

/* Gold-Silver top bar */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--silver2),var(--gold2),var(--gold3),var(--gold2),var(--silver2),transparent);
}

/* ─── Header ─── */
.card-head{
  padding:28px 24px 20px;
  text-align:center;
  border-bottom:1px solid rgba(212,168,67,.12);
  position:relative;
}

/* Shield emblem */
.emblem{width:76px;height:76px;margin:0 auto 14px;}
.emblem svg{width:100%;height:100%;}

.card-head h1{
  font-size:18px;font-weight:900;letter-spacing:1px;margin-bottom:4px;
  background:linear-gradient(135deg,var(--silver3),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.card-head p{font-size:12px;color:var(--muted);font-weight:300;line-height:1.6;}

/* ─── Body ─── */
.card-body{padding:20px 22px;}

/* Status strip */
.status-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.strip-item{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(212,168,67,.1);
  border-radius:10px;padding:11px 13px;
}
.strip-label{font-size:10px;color:rgba(212,168,67,.55);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.strip-val{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;color:var(--silver2);}
.pip{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);flex-shrink:0;transition:background .4s;}
.pip.ok{background:#4cde8a;box-shadow:0 0 8px rgba(76,222,138,.5);}
.pip.bad{background:#ff4444;box-shadow:0 0 8px rgba(255,68,68,.5);}
.pip.loading{background:var(--gold);animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Field */
.field{margin-bottom:13px;}
.field label{
  display:block;font-size:10px;font-weight:700;
  color:rgba(212,168,67,.6);margin-bottom:6px;
  letter-spacing:.8px;text-transform:uppercase;
}
.input-wrap{position:relative;}
.input-wrap input{
  width:100%;padding:13px 16px 13px 46px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(212,168,67,.15);
  border-radius:10px;
  font-family:inherit;font-size:15px;font-weight:600;
  color:var(--white);outline:none;
  transition:all .25s;direction:ltr;text-align:right;
}
.input-wrap input::placeholder{color:rgba(255,255,255,.18);}
.input-wrap input:focus{
  border-color:var(--gold);
  background:rgba(212,168,67,.05);
  box-shadow:0 0 0 3px rgba(212,168,67,.07);
}
.input-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;opacity:.45;pointer-events:none;}

/* Buttons */
.btn-main{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#7a5a10,var(--gold),var(--gold2),var(--gold3),var(--gold2));
  border:none;border-radius:10px;
  font-family:inherit;font-size:15px;font-weight:900;
  color:#0d0800;cursor:pointer;
  transition:all .25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 24px rgba(212,168,67,.28);
  margin-bottom:10px;letter-spacing:.5px;
  position:relative;overflow:hidden;
}
.btn-main::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 60%);
  opacity:0;transition:opacity .2s;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,168,67,.38);}
.btn-main:hover::after{opacity:1;}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* Upload button */
.upload-label{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;
  background:rgba(184,196,204,.06);
  border:1.5px dashed rgba(184,196,204,.25);
  border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:700;
  color:var(--silver2);cursor:pointer;
  transition:all .25s;text-align:center;
  margin-bottom:10px;
}
.upload-label:hover{background:rgba(184,196,204,.1);border-color:rgba(184,196,204,.4);}

.btn-send{
  width:100%;padding:13px;
  background:linear-gradient(135deg,rgba(184,196,204,.1),rgba(184,196,204,.18));
  border:1px solid rgba(184,196,204,.3);
  border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:700;
  color:var(--silver2);cursor:pointer;
  transition:all .25s;
  display:none;align-items:center;justify-content:center;gap:8px;
  margin-bottom:10px;
}
.btn-send:hover{background:rgba(184,196,204,.2);border-color:rgba(184,196,204,.5);}
.btn-send.visible{display:flex;}
.btn-send:disabled{opacity:.4;cursor:not-allowed;}

.btn-refresh{
  width:100%;padding:10px;
  background:transparent;
  border:1px solid rgba(255,255,255,.06);
  border-radius:10px;
  font-family:inherit;font-size:12px;font-weight:600;
  color:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;
}
.btn-refresh:hover{border-color:rgba(255,255,255,.14);color:rgba(255,255,255,.55);}

/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.15),transparent);margin:14px 0;}

/* Receipt preview */
.receipt-preview{
  width:100%;border-radius:10px;margin-top:10px;
  border:1px solid rgba(184,196,204,.2);
  display:none;
}

/* Payment section */
.payment-section{
  display:none;padding:14px;
  background:rgba(212,168,67,.06);
  border:1px solid rgba(212,168,67,.18);
  border-radius:12px;margin-bottom:12px;
  animation:fadeIn .4s ease;
}
.payment-section.show{display:block;}
.payment-amount{
  font-size:26px;font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-align:center;margin-bottom:2px;
}
.payment-label{font-size:11px;color:rgba(212,168,67,.55);text-align:center;letter-spacing:.5px;}

/* Alerts */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;line-height:1.5;margin-top:10px;animation:fadeIn .3s ease;}
.alert.success{background:rgba(76,222,138,.08);color:#7dffc0;border:1px solid rgba(76,222,138,.18);}
.alert.error{background:rgba(255,68,68,.08);color:#ff9494;border:1px solid rgba(255,68,68,.18);}
.alert.warn{background:rgba(212,168,67,.08);color:var(--gold2);border:1px solid rgba(212,168,67,.18);}
.alert-ico{font-size:15px;flex-shrink:0;margin-top:1px;}

/* Footer */
.card-foot{padding:13px 22px;border-top:1px solid rgba(212,168,67,.08);background:rgba(0,0,0,.35);text-align:center;}
.card-foot p{font-size:11px;color:rgba(255,255,255,.2);line-height:1.7;}
.device-id{font-size:9px;color:rgba(212,168,67,.15);margin-top:3px;direction:ltr;word-break:break-all;}

.spin{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#0d0800;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>

function getDeviceId(){
  let id=localStorage.getItem('__did__');
  if(!id){ id='D-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,7).toUpperCase(); localStorage.setItem('__did__',id); }
  return id;
}
const DEVICE_ID=getDeviceId();
document.getElementById('did-display').textContent='ID: '+DEVICE_ID;

function dist(la1,lo1,la2,lo2){
  const R=6371000,d2r=Math.PI/180;
  const dLa=(la2-la1)*d2r,dLo=(lo2-lo1)*d2r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let pos=null, checkedInPhone=null;

function alert_(elId,type,ico,msg){
  document.getElementById(elId).innerHTML=`<div class="alert ${type}"><span class="alert-ico">${ico}</span><span>${msg}</span></div>`;
}

window.getLocation=function(){
  const pip=document.getElementById('gps-pip'),txt=document.getElementById('gps-txt');
  const zpip=document.getElementById('zone-pip'),ztxt=document.getElementById('zone-txt');
  pip.className='pip loading'; txt.textContent='جاري التحديد...';
  zpip.className='pip'; ztxt.textContent='—';
  if(!navigator.geolocation){ pip.className='pip bad'; txt.textContent='غير مدعوم'; return; }
  function onSuccess(p){
    pos=p.coords; pip.className='pip ok';
    txt.textContent=pos.latitude.toFixed(4)+', '+pos.longitude.toFixed(4);
    const d=dist(pos.latitude,pos.longitude,ZONE_LAT,ZONE_LNG);
    zpip.className='pip '+(d<=ZONE_RADIUS_M?'ok':'bad');
    ztxt.textContent=d<=ZONE_RADIUS_M?'داخل المنطقة ✓':'خارج النطاق ✗';
  }
  function onError(err){
    pip.className='pip bad';
    const msgs={1:'الإذن مرفوض',2:'تعذّر التحديد',3:'انتهت المهلة'};
    txt.textContent=msgs[err.code]||'خطأ';
    alert_('alert-box','error','📍',msgs[err.code]||'تعذّر تحديد الموقع');
  }
  navigator.geolocation.getCurrentPosition(onSuccess,
    ()=>navigator.geolocation.getCurrentPosition(onSuccess,onError,{enableHighAccuracy:false,timeout:15000,maximumAge:30000}),
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}

window.doCheckIn=async function(){
  const phone=document.getElementById('phone').value.trim();
  const btn=document.getElementById('checkin-btn');
  if(phone.length<10){ alert_('alert-box','error','⚠️','أدخل رقم جوال صحيح'); return; }
  if(!pos){ alert_('alert-box','warn','📍','اضغط تحديث الموقع أولاً'); return; }
  btn.disabled=true; btn.innerHTML='<div class="spin"></div>';
  try{
    const d=dist(pos.latitude,pos.longitude,ZONE_LAT,ZONE_LNG);
    if(d>ZONE_RADIUS_M){ alert_('alert-box','error','📍',`خارج المنطقة بـ ${Math.round(d)} متر`); done(btn); return; }
    const devSnap=await getDocs(query(collection(db,'users'),where('deviceId','==',DEVICE_ID)));
    if(!devSnap.empty && devSnap.docs[0].data().phone!==phone){ alert_('alert-box','error','🚫','هذا الجهاز مسجّل برقم آخر'); done(btn); return; }
    const userDoc=await getDoc(doc(db,'users',phone));
    if(userDoc.exists() && userDoc.data().deviceId!==DEVICE_ID){ alert_('alert-box','error','🚫','هذا الرقم مرتبط بجهاز آخر'); done(btn); return; }
    if(!userDoc.exists()){ await setDoc(doc(db,'users',phone),{phone,deviceId:DEVICE_ID,registeredAt:new Date().toISOString()}); }
    await addDoc(collection(db,'attendance'),{phone,deviceId:DEVICE_ID,lat:pos.latitude,lng:pos.longitude,accuracy:pos.accuracy,time:new Date().toISOString()});
    checkedInPhone=phone;
    localStorage.setItem('__last_phone__',phone);
    localStorage.setItem('__last_checkin__',new Date().toDateString());
    alert_('alert-box','success','✅',`تم تسجيل حضورك — ${new Date().toLocaleTimeString('ar-SA')}`);
    await showPaymentAmount(phone);
  } catch(e){ alert_('alert-box','error','❌','حدث خطأ، حاول مرة أخرى'); console.error(e); }
  done(btn);
}

async function showPaymentAmount(phone){
  try{
    const empDoc=await getDoc(doc(db,'employees',phone));
    if(empDoc.exists() && empDoc.data().amount>0){
      document.getElementById('payment-amount').textContent=empDoc.data().amount+' ريال';
      document.getElementById('payment-section').classList.add('show');
    }
  } catch(e){ console.error(e); }
}

// Restore on reload
async function restoreSession(){
  const savedPhone=localStorage.getItem('__last_phone__');
  const savedDate=localStorage.getItem('__last_checkin__');
  if(savedPhone && savedDate===new Date().toDateString()){
    checkedInPhone=savedPhone;
    document.getElementById('phone').value=savedPhone;
    await showPaymentAmount(savedPhone);
  }
}

window.previewImg=function(input){
  if(!input.files[0]) return;
  const file=input.files[0];
  if(file.size>800000){
    alert_('payment-alert','warn','⚠️','الصورة كبيرة — اختر صورة أصغر من 800KB');
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    const preview=document.getElementById('img-preview');
    preview.src=e.target.result;
    preview.style.display='block';
    document.getElementById('btn-send').classList.add('visible');
  };
  reader.readAsDataURL(file);
}

window.sendReceipt=async function(){
  const preview=document.getElementById('img-preview');
  if(!preview.src||preview.style.display==='none'){
    alert_('payment-alert','warn','⚠️','اختر صورة الإيصال أولاً');
    return;
  }
  const phone=checkedInPhone||document.getElementById('phone').value.trim();
  if(phone.length<10){ alert_('payment-alert','error','⚠️','أدخل رقم جوالك أولاً'); return; }
  const btn=document.getElementById('btn-send');
  btn.disabled=true; btn.innerHTML='⏳ &nbsp; جاري الإرسال...';
  try{
    await addDoc(collection(db,'payments'),{
      phone, receiptImg:preview.src,
      status:'pending', time:new Date().toISOString()
    });
    alert_('payment-alert','success','✅','تم إرسال الإيصال للمدير بنجاح');
    preview.style.display='none';
    btn.classList.remove('visible');
    btn.disabled=false;
    btn.innerHTML='📤 &nbsp; إرسال الإيصال للمدير';
    document.getElementById('receipt-img').value='';
  } catch(e){
    alert_('payment-alert','error','❌','فشل الإرسال — الصورة قد تكون كبيرة جداً');
    btn.disabled=false;
    btn.innerHTML='📤 &nbsp; إرسال الإيصال للمدير';
  }
}

function done(btn){ btn.disabled=false; btn.textContent='تسجيل الحضور'; }

getLocation();
restoreSession();
</script>
</body>
</html>
