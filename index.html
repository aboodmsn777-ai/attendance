<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knights FC</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a843;--gold2:#f5c842;--gold3:#ffe066;
  --silver:#b8c4cc;--silver2:#dce8f0;
  --dark:#0a0a0a;--card:rgba(16,16,16,.97);
  --border:rgba(212,168,67,.18);--border2:rgba(184,196,204,.12);
  --white:#fff;--muted:rgba(255,255,255,.4);
}

body{
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;color:var(--white);
  background:var(--dark);
  overflow-x:hidden;
}

/* subtle background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(212,168,67,.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 0% 100%, rgba(184,196,204,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 100% 100%, rgba(184,196,204,.04) 0%, transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(212,168,67,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,.03) 1px,transparent 1px);
  background-size:44px 44px;
}

/* Top brand */
.top-wrap{position:relative;z-index:2;text-align:center;margin-bottom:20px;animation:fadeDown .6s ease both;}
.club-name{font-size:26px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--silver2),var(--gold2),var(--silver2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px;}
.club-sub{font-size:10px;letter-spacing:4px;color:rgba(212,168,67,.5);font-weight:500;}
.gold-line{width:70px;height:1px;margin:7px auto 0;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}

/* Card */
.card{
  position:relative;z-index:2;
  width:100%;max-width:420px;
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 32px 64px rgba(0,0,0,.8),inset 0 1px 0 rgba(212,168,67,.1);
  animation:fadeUp .5s ease both .1s;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--silver2),var(--gold2),var(--gold3),var(--gold2),var(--silver2),transparent);}

/* Head */
.card-head{padding:24px 22px 18px;text-align:center;border-bottom:1px solid var(--border);}
.emblem{width:64px;height:64px;margin:0 auto 12px;}
.emblem svg{width:100%;height:100%;}
.card-head h1{font-size:17px;font-weight:900;letter-spacing:1px;margin-bottom:3px;background:linear-gradient(135deg,var(--silver2),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-head p{font-size:11px;color:var(--muted);line-height:1.6;}

/* Player name badge */
.player-badge{
  display:none;margin:10px 22px 0;padding:10px 14px;
  background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);
  border-radius:10px;text-align:center;
}
.player-badge.show{display:block;}
.player-badge .pname{font-size:16px;font-weight:800;color:var(--gold2);}
.player-badge .pwelcome{font-size:11px;color:rgba(212,168,67,.6);margin-top:2px;}

/* Body */
.card-body{padding:18px 22px;}

/* Status strip */
.status-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.strip-item{background:rgba(255,255,255,.03);border:1px solid rgba(212,168,67,.1);border-radius:10px;padding:10px 12px;}
.strip-label{font-size:10px;color:rgba(212,168,67,.5);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;}
.strip-val{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;color:var(--silver2);}
.pip{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);flex-shrink:0;transition:background .4s;}
.pip.ok{background:#4cde8a;box-shadow:0 0 7px rgba(76,222,138,.5);}
.pip.bad{background:#ff4444;box-shadow:0 0 7px rgba(255,68,68,.5);}
.pip.loading{background:var(--gold);animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Fields */
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;color:rgba(212,168,67,.55);margin-bottom:6px;letter-spacing:.7px;text-transform:uppercase;}
.input-wrap{position:relative;}
.input-wrap input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.14);border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;color:var(--white);outline:none;transition:all .22s;direction:ltr;text-align:right;}
.input-wrap input::placeholder{color:rgba(255,255,255,.18);}
.input-wrap input:focus{border-color:var(--gold);background:rgba(212,168,67,.05);}
.input-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4;pointer-events:none;}

/* Main button */
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#7a5a10,var(--gold),var(--gold2),var(--gold3));border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:900;color:#0d0800;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 5px 20px rgba(212,168,67,.25);margin-bottom:8px;letter-spacing:.4px;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(212,168,67,.35);}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.btn-refresh{width:100%;padding:9px;background:transparent;border:1px solid rgba(255,255,255,.06);border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;color:rgba(255,255,255,.28);cursor:pointer;transition:all .2s;margin-bottom:14px;}
.btn-refresh:hover{border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.5);}

/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.12),transparent);margin:4px 0 14px;}

/* Two column layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;}

/* Upload section */
.upload-section{}
.upload-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px 10px;background:rgba(255,255,255,.03);border:1.5px dashed rgba(184,196,204,.2);border-radius:12px;font-family:inherit;font-size:12px;font-weight:700;color:var(--silver2);cursor:pointer;transition:all .22s;text-align:center;min-height:110px;}
.upload-label:hover{background:rgba(184,196,204,.07);border-color:rgba(184,196,204,.35);}
.upload-label .u-ico{font-size:24px;opacity:.7;}
.receipt-preview{width:100%;border-radius:10px;margin-top:8px;border:1px solid rgba(184,196,204,.15);display:none;max-height:120px;object-fit:cover;}
.btn-send{width:100%;padding:10px;background:rgba(184,196,204,.08);border:1px solid rgba(184,196,204,.22);border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;color:var(--silver2);cursor:pointer;transition:all .22s;display:none;align-items:center;justify-content:center;gap:6px;margin-top:8px;}
.btn-send.show{display:flex;}
.btn-send:hover{background:rgba(184,196,204,.15);}
.btn-send:disabled{opacity:.4;cursor:not-allowed;}

/* Balance section */
.balance-section{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.15);border-radius:12px;padding:14px 10px;min-height:110px;text-align:center;}
.balance-label{font-size:10px;font-weight:700;color:rgba(212,168,67,.55);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.balance-amount{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px;}
.balance-sub{font-size:10px;color:rgba(212,168,67,.45);}
.balance-confirmed{font-size:11px;color:#4cde8a;font-weight:700;margin-top:6px;display:none;}
.balance-confirmed.show{display:block;}

/* Alerts */
.alert{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:10px;font-size:12px;font-weight:600;line-height:1.5;margin-top:10px;animation:fadeIn .3s ease;}
.alert.success{background:rgba(76,222,138,.07);color:#7dffc0;border:1px solid rgba(76,222,138,.15);}
.alert.error{background:rgba(255,68,68,.07);color:#ff9494;border:1px solid rgba(255,68,68,.15);}
.alert.warn{background:rgba(212,168,67,.07);color:var(--gold2);border:1px solid rgba(212,168,67,.15);}
.alert.info{background:rgba(184,196,204,.07);color:var(--silver2);border:1px solid rgba(184,196,204,.15);}
.alert-ico{font-size:14px;flex-shrink:0;margin-top:1px;}

/* Payment amount badge */
.payment-section{display:none;padding:10px 14px;background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.15);border-radius:10px;margin-bottom:10px;text-align:center;animation:fadeIn .4s ease;}
.payment-section.show{display:block;}
.payment-amount{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.payment-label{font-size:11px;color:rgba(212,168,67,.5);}

/* Footer */
.card-foot{padding:12px 22px;border-top:1px solid var(--border);background:rgba(0,0,0,.4);text-align:center;}
.card-foot p{font-size:10px;color:rgba(255,255,255,.18);line-height:1.7;}
.device-id{font-size:9px;color:rgba(212,168,67,.12);margin-top:2px;direction:ltr;word-break:break-all;}

.spin{width:16px;height:16px;border:2px solid rgba(0,0,0,.15);border-top-color:#0d0800;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="top-wrap">
  <div class="club-name">KNIGHTS FC</div>
  <div class="club-sub">ATTENDANCE SYSTEM</div>
  <div class="gold-line"></div>
</div>

<div class="card">
  <!-- Head -->
  <div class="card-head">
    <div class="emblem">
      <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gs" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#b8c4cc"/>
            <stop offset="50%" stop-color="#f5c842"/>
            <stop offset="100%" stop-color="#b8c4cc"/>
          </linearGradient>
        </defs>
        <path d="M50 4 L92 18 L92 58 Q92 85 50 104 Q8 85 8 58 L8 18 Z" fill="rgba(12,12,12,.9)" stroke="url(#gs)" stroke-width="1.5"/>
        <path d="M50 12 L85 24 L85 58 Q85 80 50 96 Q15 80 15 58 L15 24 Z" fill="none" stroke="rgba(212,168,67,.18)" stroke-width="1"/>
        <path d="M38 45 L38 35 Q38 28 50 28 Q62 28 62 35 L62 45 L65 55 L60 60 L55 58 L50 62 L45 58 L40 60 L35 55 Z" fill="rgba(212,168,67,.12)" stroke="#d4a843" stroke-width="1"/>
        <text x="50" y="80" text-anchor="middle" fill="#d4a843" font-size="7" letter-spacing="3">★ ★ ★</text>
        <text x="50" y="92" text-anchor="middle" fill="rgba(184,196,204,.5)" font-size="7" letter-spacing="2" font-weight="bold">FC</text>
      </svg>
    </div>
    <h1>تسجيل الحضور</h1>
    <p>يتحقق من موقعك وجهازك تلقائياً</p>
  </div>

  <!-- Player name badge -->
  <div class="player-badge" id="player-badge">
    <div class="pname" id="player-name">—</div>
    <div class="pwelcome">أهلاً بك في Knights FC</div>
  </div>

  <!-- Body -->
  <div class="card-body">

    <!-- GPS Status -->
    <div class="status-strip">
      <div class="strip-item">
        <div class="strip-label">الموقع</div>
        <div class="strip-val"><div class="pip loading" id="gps-pip"></div><span id="gps-txt">جاري التحديد</span></div>
      </div>
      <div class="strip-item">
        <div class="strip-label">المنطقة</div>
        <div class="strip-val"><div class="pip" id="zone-pip"></div><span id="zone-txt">—</span></div>
      </div>
    </div>

    <!-- Phone -->
    <div class="field">
      <label>رقم جوالك</label>
      <div class="input-wrap">
        <span class="ico">📱</span>
        <input type="tel" id="phone" placeholder="05XXXXXXXX" maxlength="10"
          onkeydown="if(event.key==='Enter') doCheckIn()"
          oninput="onPhoneInput(this.value)">
      </div>
    </div>

    <!-- Check in -->
    <button class="btn-main" id="checkin-btn" onclick="doCheckIn()">تسجيل الحضور</button>
    <button class="btn-refresh" onclick="getLocation()">↻ تحديث الموقع</button>

    <div id="alert-box"></div>

    <!-- Payment amount -->
    <div class="payment-section" id="payment-section">
      <div class="payment-amount" id="payment-amount">—</div>
      <div class="payment-label">المبلغ المطلوب منك</div>
    </div>

    <div class="divider"></div>

    <!-- Two columns: Upload + Balance -->
    <div class="two-col">

      <!-- Upload receipt -->
      <div class="upload-section">
        <label class="upload-label" for="receipt-img">
          <span class="u-ico">📸</span>
          <span>رفع إيصال الدفع</span>
          <span style="font-size:10px;font-weight:400;color:rgba(184,196,204,.5);">اضغط لاختيار صورة</span>
          <input type="file" id="receipt-img" accept="image/*" style="display:none;" onchange="previewImg(this)">
        </label>
        <img id="img-preview" class="receipt-preview" alt="معاينة">
        <button class="btn-send" id="btn-send" onclick="sendReceipt()">📤 إرسال للمدير</button>
        <div id="payment-alert"></div>
      </div>

      <!-- Balance -->
      <div class="balance-section">
        <div class="balance-label">رصيدك</div>
        <div class="balance-amount" id="balance-amount">0</div>
        <div class="balance-sub">ريال مؤكد</div>
        <div class="balance-confirmed" id="balance-confirmed">✅ تم التأكيد</div>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <div class="card-foot">
    <p>جهاز واحد — رقم واحد فقط</p>
    <div class="device-id" id="did-display"></div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, addDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhz3ak31RfexMaN_HwwQBxUFgiYwgNXEM",
  authDomain: "attendance-5df07.firebaseapp.com",
  projectId: "attendance-5df07",
  storageBucket: "attendance-5df07.firebasestorage.app",
  messagingSenderId: "1028227731064",
  appId: "1:1028227731064:web:81c2902d98b0e52437278d"
};

let ZONE_LAT=24.783556, ZONE_LNG=46.724472, ZONE_RADIUS_M=100;
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

function getDeviceId(){
  let id=localStorage.getItem('__did__');
  if(!id){ id='D-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,7).toUpperCase(); localStorage.setItem('__did__',id); }
  return id;
}
const DEVICE_ID=getDeviceId();
document.getElementById('did-display').textContent='ID: '+DEVICE_ID;

function dist(la1,lo1,la2,lo2){
  const R=6371000,d2r=Math.PI/180;
  const dLa=(la2-la1)*d2r,dLo=(lo2-lo1)*d2r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let pos=null, checkedInPhone=null, playerName=null;

function alert_(elId,type,ico,msg){
  document.getElementById(elId).innerHTML=`<div class="alert ${type}"><span class="alert-ico">${ico}</span><span>${msg}</span></div>`;
}

// ─── جلب اسم اللاعب من قاعدة البيانات عند كتابة الرقم ───
window.onPhoneInput=async function(val){
  if(val.length===10){
    try{
      const empDoc=await getDoc(doc(db,'employees',val));
      if(empDoc.exists()&&empDoc.data().name){
        playerName=empDoc.data().name;
        document.getElementById('player-name').textContent=playerName;
        document.getElementById('player-badge').classList.add('show');
      } else {
        document.getElementById('player-badge').classList.remove('show');
        playerName=null;
      }
    } catch(e){ console.error(e); }
  } else {
    document.getElementById('player-badge').classList.remove('show');
    playerName=null;
  }
}

// ─── GPS ───
window.getLocation=async function(){
  // جلب الموقع من Firebase أولاً
  try{
    const locDoc=await getDoc(doc(db,'settings','location'));
    if(locDoc.exists()&&locDoc.data().lat){
      ZONE_LAT=locDoc.data().lat;
      ZONE_LNG=locDoc.data().lng;
      ZONE_RADIUS_M=locDoc.data().radius||100;
    }
  } catch(e){ console.error('zone fetch:',e); }
  _startGPS();
}
function _startGPS(){
  const pip=document.getElementById('gps-pip'),txt=document.getElementById('gps-txt');
  const zpip=document.getElementById('zone-pip'),ztxt=document.getElementById('zone-txt');
  pip.className='pip loading'; txt.textContent='جاري التحديد...';
  zpip.className='pip'; ztxt.textContent='—';
  if(!navigator.geolocation){ pip.className='pip bad'; txt.textContent='غير مدعوم'; return; }
  function onSuccess(p){
    pos=p.coords; pip.className='pip ok';
    txt.textContent=pos.latitude.toFixed(4)+', '+pos.longitude.toFixed(4);
    const d=dist(pos.latitude,pos.longitude,ZONE_LAT,ZONE_LNG);
    zpip.className='pip '+(d<=ZONE_RADIUS_M?'ok':'bad');
    ztxt.textContent=d<=ZONE_RADIUS_M?'داخل المنطقة ✓':'خارج النطاق ✗';
  }
  function onError(err){
    pip.className='pip bad';
    const msgs={1:'الإذن مرفوض',2:'تعذّر التحديد',3:'انتهت المهلة'};
    txt.textContent=msgs[err.code]||'خطأ';
    alert_('alert-box','error','📍',msgs[err.code]||'تعذّر تحديد الموقع');
  }
  navigator.geolocation.getCurrentPosition(onSuccess,
    ()=>navigator.geolocation.getCurrentPosition(onSuccess,onError,{enableHighAccuracy:false,timeout:15000,maximumAge:30000}),
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}

// ─── تسجيل الحضور ───
window.doCheckIn=async function(){
  const phone=document.getElementById('phone').value.trim();
  const btn=document.getElementById('checkin-btn');
  if(phone.length<10){ alert_('alert-box','error','⚠️','أدخل رقم جوال صحيح'); return; }
  if(!pos){ alert_('alert-box','warn','📍','اضغط تحديث الموقع أولاً'); return; }
  btn.disabled=true; btn.innerHTML='<div class="spin"></div>';
  try{
    const d=dist(pos.latitude,pos.longitude,ZONE_LAT,ZONE_LNG);
    if(d>ZONE_RADIUS_M){ alert_('alert-box','error','📍',`خارج المنطقة بـ ${Math.round(d)} متر`); done(btn); return; }
    const devSnap=await getDocs(query(collection(db,'users'),where('deviceId','==',DEVICE_ID)));
    if(!devSnap.empty && devSnap.docs[0].data().phone!==phone){ alert_('alert-box','error','🚫','هذا الجهاز مسجّل برقم آخر'); done(btn); return; }
    const userDoc=await getDoc(doc(db,'users',phone));
    if(userDoc.exists() && userDoc.data().deviceId!==DEVICE_ID){ alert_('alert-box','error','🚫','هذا الرقم مرتبط بجهاز آخر'); done(btn); return; }
    if(!userDoc.exists()){ await setDoc(doc(db,'users',phone),{phone,deviceId:DEVICE_ID,registeredAt:new Date().toISOString()}); }
    await addDoc(collection(db,'attendance'),{
      phone, name:playerName||'—', deviceId:DEVICE_ID,
      lat:pos.latitude, lng:pos.longitude, accuracy:pos.accuracy,
      time:new Date().toISOString()
    });
    checkedInPhone=phone;
    localStorage.setItem('__last_phone__',phone);
    localStorage.setItem('__last_checkin__',new Date().toDateString());
    const name=playerName?` — ${playerName}`:'';
    alert_('alert-box','success','✅',`تم تسجيل حضورك${name} — ${new Date().toLocaleTimeString('ar-SA')}`);
    await loadPlayerData(phone);
  } catch(e){ alert_('alert-box','error','❌','حدث خطأ، حاول مرة أخرى'); console.error(e); }
  done(btn);
}

// ─── جلب بيانات اللاعب (مبلغ + رصيد) ───
async function loadPlayerData(phone){
  try{
    // المبلغ المطلوب
    const empDoc=await getDoc(doc(db,'employees',phone));
    if(empDoc.exists()){
      if(empDoc.data().name){
        playerName=empDoc.data().name;
        document.getElementById('player-name').textContent=playerName;
        document.getElementById('player-badge').classList.add('show');
      }
      if(empDoc.data().amount>0){
        document.getElementById('payment-amount').textContent=empDoc.data().amount+' ريال';
        document.getElementById('payment-section').classList.add('show');
      }
    }
    // الرصيد (مجموع المدفوعات المؤكدة)
    await updateBalance(phone);
  } catch(e){ console.error(e); }
}

// ─── تحديث الرصيد ───
async function updateBalance(phone){
  try{
    const paySnap=await getDocs(query(
      collection(db,'payments'),
      where('phone','==',phone),
      where('status','==','confirmed')
    ));
    let total=0;
    let lastConfirmed=null;
    paySnap.docs.forEach(d=>{
      total+=(d.data().amount||0);
      lastConfirmed=d.data();
    });
    document.getElementById('balance-amount').textContent=total;
    if(lastConfirmed){
      document.getElementById('balance-confirmed').classList.add('show');
    }
    // تحقق إذا في تأكيد جديد منذ آخر مرة
    const lastSeen=localStorage.getItem('__last_confirmed__');
    if(paySnap.docs.length>0){
      const latestId=paySnap.docs[paySnap.docs.length-1].id;
      if(lastSeen!==latestId){
        const amount=paySnap.docs[paySnap.docs.length-1].data().amount||0;
        alert_('payment-alert','success','💰',`تم تأكيد دفعتك — ${amount} ريال ✅`);
        localStorage.setItem('__last_confirmed__',latestId);
      }
    }
  } catch(e){ console.error(e); }
}

// ─── استعادة الجلسة عند فتح الصفحة ───
async function restoreSession(){
  const savedPhone=localStorage.getItem('__last_phone__');
  const savedDate=localStorage.getItem('__last_checkin__');
  if(savedPhone && savedDate===new Date().toDateString()){
    checkedInPhone=savedPhone;
    document.getElementById('phone').value=savedPhone;
    await loadPlayerData(savedPhone);
  }
}

// ─── معاينة الصورة ───
window.previewImg=function(input){
  if(!input.files[0]) return;
  const file=input.files[0];
  if(file.size>900000){ alert_('payment-alert','warn','⚠️','الصورة كبيرة — اختر أصغر من 900KB'); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    const preview=document.getElementById('img-preview');
    preview.src=e.target.result; preview.style.display='block';
    document.getElementById('btn-send').classList.add('show');
  };
  reader.readAsDataURL(file);
}

// ─── قراءة المبلغ من الإيصال بالذكاء الاصطناعي ───
async function extractAmountFromReceipt(base64Img){
  try{
    alert_('payment-alert','info','🤖','جاري قراءة الإيصال بالذكاء الاصطناعي...');
    const base64Data=base64Img.split(',')[1];
    const mediaType=base64Img.split(';')[0].split(':')[1]||'image/jpeg';
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      "method":"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        "model":"claude-sonnet-4-20250514",
        "max_tokens":200,
        messages:[{
          role:'user',
          content:[
            {"type":"image","source":{"type":"base64","media_type":mediaType,"data":base64Data}},
            {"type":"text","text":"استخرج المبلغ المدفوع من هذا الإيصال. أجب برقم فقط بدون نص إضافي. مثال: 150. اذا لم تجد مبلغا اجب بـ 0"}
          ]
        }]
      })
    });
    const data=await response.json();
    const text=(data.content&&data.content[0]&&data.content[0].text)||'0';
    const amount=parseFloat(text.replace(/[^0-9.]/g,''))||0;
    return amount;
  } catch(e){
    console.error('AI extraction error:',e);
    return 0;
  }
}

// ─── إرسال الإيصال ───
window.sendReceipt=async function(){
  const preview=document.getElementById('img-preview');
  if(!preview.src||preview.style.display==='none'){ alert_('payment-alert','warn','⚠️','اختر صورة الإيصال أولاً'); return; }
  const phone=checkedInPhone||document.getElementById('phone').value.trim();
  if(phone.length<10){ alert_('payment-alert','error','⚠️','أدخل رقم جوالك أولاً'); return; }

  const btn=document.getElementById('btn-send');
  btn.disabled=true; btn.textContent='🤖 جاري القراءة...';

  // قراءة المبلغ من الإيصال بالذكاء الاصطناعي
  const extractedAmount=await extractAmountFromReceipt(preview.src);

  btn.textContent='⏳ جاري الإرسال...';
  try{
    await addDoc(collection(db,'payments'),{
      phone, name:playerName||'—',
      receiptImg:preview.src,
      amount:extractedAmount,
      status:'pending',
      time:new Date().toISOString()
    });
    const amountMsg=extractedAmount>0?' — المبلغ: '+extractedAmount+' ريال':'';
    alert_('payment-alert','info','📨','تم الإرسال'+amountMsg+' — سيتم التأكيد من المدير قريباً');
    preview.style.display='none';
    btn.classList.remove('show');
    btn.disabled=false; btn.textContent='📤 إرسال للمدير';
    document.getElementById('receipt-img').value='';
  } catch(e){
    alert_('payment-alert','error','❌','فشل الإرسال — الصورة قد تكون كبيرة');
    btn.disabled=false; btn.textContent='📤 إرسال للمدير';
  }
}

function done(btn){ btn.disabled=false; btn.textContent='تسجيل الحضور'; }

// تحديث الرصيد كل 30 ثانية
async function autoCheck(){
  const phone=checkedInPhone||localStorage.getItem('__last_phone__');
  if(phone) await updateBalance(phone);
}

getLocation();
restoreSession();
setInterval(autoCheck, 30000);
</script>
